    T2L_TiTa: 0. 0. 0.
    T2L_TaT1: 0. 0. 0.
    T2L_TaT3: 0 0.005 0
    T2L_TaTip: 0. 0. 0.
    T2R_Tro: 0. 0. 0.
    T2R_FeTi: 0. 0. 0.
    T2R_TiTa: 0. 0. 0.
    T2R_TaT1: 0. 0. 0.
    T2R_TaT3: 0. 0. 0.
    T2R_TaTip: 0 -0.005 0
    T3L_Tro: 0. 0. 0.
    T3L_FeTi: 0. 0. 0.
    T3L_TiTa: 0. 0. 0.
    T3L_TaT1: 0. 0. 0.
    T3L_TaT3: 0. 0. 0.
